# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, set of tools, and environment. 
build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
  apt_packages:
    # Read the Docs allows specific pre-approved packages
    - doxygen
    - graphviz
  commands:
    # Install the Zensical build dependency
    - python -m pip install -r docs/requirements.txt
    # Generate Doxygen documentation
    - doxygen Doxyfile
    # Build Zensical documentation
    - python -m zensical build --clean --config-file docs/zensical.toml
    # Publish the generated static site for Read the Docs
    - mkdir --parents $READTHEDOCS_OUTPUT/html/
    - cp --recursive docs/site/* $READTHEDOCS_OUTPUT/html/
